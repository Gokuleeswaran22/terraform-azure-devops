trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  serviceConnection: 'Azure-ServiceConnection'

steps:

- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.15.8'


# ==========================================
# TERRAFORM DEPLOYMENT
# ==========================================

- task: AzureCLI@2
  displayName: 'Terraform Init, Plan and Apply'
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    inlineScript: |
      export ARM_CLIENT_ID="$servicePrincipalId"
      export ARM_TENANT_ID="$tenantId"
      export ARM_SUBSCRIPTION_ID="96124cd3-9a56-47cc-a8de-97cf3a98f50b"
      export ARM_OIDC_TOKEN="$idToken"
      export ARM_USE_OIDC="true"

      echo "======================================"
      echo " TERRAFORM INITIALIZATION"
      echo "======================================"

      terraform init -reconfigure

      echo "======================================"
      echo " TERRAFORM VALIDATION"
      echo "======================================"

      terraform validate

      echo "======================================"
      echo " TERRAFORM PLAN"
      echo "======================================"

      terraform plan -out=tfplan

      echo "======================================"
      echo " TERRAFORM APPLY"
      echo "======================================"

      terraform apply -auto-approve tfplan

      echo "======================================"
      echo " TERRAFORM DEPLOYMENT SUCCESSFUL"
      echo "======================================"


# ==========================================
# TERRAFORM STATE
# ==========================================

- task: AzureCLI@2
  displayName: 'Terraform State - Managed Resources'
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    inlineScript: |
      export ARM_CLIENT_ID="$servicePrincipalId"
      export ARM_TENANT_ID="$tenantId"
      export ARM_SUBSCRIPTION_ID="96124cd3-9a56-47cc-a8de-97cf3a98f50b"
      export ARM_OIDC_TOKEN="$idToken"
      export ARM_USE_OIDC="true"

      terraform init -reconfigure

      echo "======================================"
      echo " TERRAFORM MANAGED RESOURCES"
      echo "======================================"

      terraform state list


# ==========================================
# AZURE RESOURCE GROUP
# ==========================================

- task: AzureCLI@2
  displayName: 'Azure Resource Group - Deployed Resources'
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "======================================"
      echo " AZURE DEPLOYED RESOURCES"
      echo " Resource Group: rg-dev-demo"
      echo "======================================"

      az resource list \
        --resource-group rg-dev-demo \
        --query "[].{Name:name, Type:type, Location:location}" \
        --output table